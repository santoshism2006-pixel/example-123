# Tiny Tapeout project information
project:
  title:        "4-Bit Comparator"
  author:       "Lyra"
  discord:      ""
  description:  "A 4-bit digital comparator implemented using Verilog HDL"
  language:     "Verilog"
  clock_hz:     100000

  # Tile size
  tiles: "1x1"

  # Top module name
  top_module:  "tt_um_4bit_comparator"

  # Source files
  source_files:
    - "tt_um_4bit_comparator.v"

# Pinout configuration
pinout:
  # Inputs
  ui[0]: "A0"
  ui[1]: "A1"
  ui[2]: "A2"
  ui[3]: "A3"
  ui[4]: "B0"
  ui[5]: "B1"
  ui[6]: "B2"
  ui[7]: "B3"

  # Outputs
  uo[0]: "A_greater_B"
  uo[1]: "A_equal_B"
  uo[2]: "A_less_B"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change
yaml_version: 6
